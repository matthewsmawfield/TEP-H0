<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smawfield_2026_TEP-H0_MNRAS_submission</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* ── Base layout (same as index.html) ─────────────────────────── */
        * { box-sizing: border-box; }

        :root {
            --purple-deep: #301E30;
            --purple-dark: #551F34;
            --purple-mid:  #4B3A55;
            --purple-accent: #A14856;
            --magenta: #A14856;
            --magenta-light: #E6D8D5;
            --gray-purple: #6A5A70;
            --gray-light: #F9F7F8;
            --text-dark: #201520;
            --bg-tint: rgba(48, 30, 48, 0.03);
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #ffffff;
            color: var(--text-dark);
            word-wrap: break-word;
        }

        a { color: var(--purple-dark); text-decoration: none; word-wrap: break-word; overflow-wrap: break-word; }
        a:visited { color: var(--gray-purple); }
        a:hover { color: var(--magenta); text-decoration: underline; }

        pre { white-space: pre-wrap; word-wrap: break-word; overflow-x: auto; max-width: 100%; }

        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--purple-dark);
            padding-bottom: 20px;
        }

        .title { font-size: 24px; font-weight: bold; margin-bottom: 10px; line-height: 1.3; }
        .subtitle { font-size: 18px; font-weight: normal; color: var(--gray-purple); margin-bottom: 15px; font-style: italic; }
        .author { font-size: 16px; margin-bottom: 10px; }

        .abstract {
            background-color: rgba(28, 46, 74, 0.04);
            padding: 20px;
            margin: 30px 0;
            border-left: 4px solid var(--purple-dark);
            font-style: italic;
        }
        .abstract h2 { margin-top: 0; font-size: 18px; font-weight: bold; font-style: normal; }

        h1 { font-size: 20px; font-weight: bold; margin-top: 40px; margin-bottom: 20px; color: var(--purple-deep); border-bottom: 1px solid var(--purple-mid); padding-bottom: 5px; }
        h2 { font-size: 18px; font-weight: bold; margin-top: 30px; margin-bottom: 15px; color: var(--purple-deep); }
        h3 { font-size: 16px; font-weight: bold; margin-top: 25px; margin-bottom: 10px; color: var(--purple-deep); }
        h4 { font-size: 15px; font-weight: bold; margin-top: 20px; margin-bottom: 8px; color: var(--purple-deep); }

        p { margin-bottom: 15px; text-align: justify; }

        .equation, pre.equation { text-align: center; margin: 20px 0; padding: 10px; overflow: hidden; max-width: 100%; }

        .theorem, .principle, .key-concept { background-color: rgba(28, 46, 74, 0.04); border: 1px solid var(--purple-mid); border-radius: 5px; padding: 15px; margin: 20px 0; }
        .theorem h3, .principle h3, .theorem h4, .principle h4, .key-concept h4 { margin-top: 0; color: var(--purple-dark); }

        .experimental-section { background-color: rgba(28, 46, 74, 0.03); border: 1px solid var(--purple-mid); border-radius: 5px; padding: 15px; margin: 20px 0; }
        .experimental-section h1:first-of-type, .experimental-section h2:first-of-type, .experimental-section h3:first-of-type { margin-top: 4px; }

        .key-finding { background-color: rgba(28, 46, 74, 0.06); border: 2px solid var(--purple-dark); border-radius: 8px; padding: 20px; margin: 25px 0; }
        .key-finding h3 { margin-top: 0; color: var(--purple-dark); }

        .key-insight { background-color: rgba(132, 163, 170, 0.08); border: 1px solid rgba(132, 163, 170, 0.4); border-radius: 5px; padding: 15px; margin: 20px 0; }
        .key-insight h4 { margin-top: 0; color: var(--purple-dark); }

        .key-quote { background-color: rgba(28, 46, 74, 0.04); border-left: 4px solid var(--purple-accent); padding: 15px 20px; margin: 20px 0; font-style: italic; }
        .key-quote blockquote { margin: 0; padding: 0; }
        .key-quote cite { display: block; margin-top: 10px; font-style: normal; color: var(--gray-purple); font-size: 14px; }

        .summary-box, .conclusion-box { background-color: rgba(28, 46, 74, 0.06); border: 2px solid var(--purple-dark); border-radius: 8px; padding: 20px; margin: 25px 0; }
        .summary-box h4, .conclusion-box h4 { margin-top: 0; color: var(--purple-dark); border-bottom: 1px solid var(--purple-mid); padding-bottom: 8px; }

        .validation-box { background-color: rgba(132, 163, 170, 0.08); border: 1px solid rgba(132, 163, 170, 0.4); border-radius: 5px; padding: 15px; margin: 20px 0; }
        .warning-box { background-color: rgba(93, 109, 126, 0.08); border: 1px solid rgba(93, 109, 126, 0.4); border-radius: 5px; padding: 15px; margin: 20px 0; }

        .significance { background-color: rgba(28, 46, 74, 0.06); border: 1px solid var(--purple-mid); border-radius: 5px; padding: 20px; margin: 30px 0; }

        .critical-analysis { background-color: rgba(28, 46, 74, 0.04); border: 2px solid var(--purple-mid); border-radius: 8px; padding: 25px; margin: 30px 0; }
        .critical-analysis h2, .critical-analysis h4 { margin-top: 0; color: var(--purple-dark); font-size: 16px; font-weight: bold; border-bottom: none; padding-bottom: 0; margin-bottom: 12px; }
        .critical-analysis h3 { color: var(--purple-dark); font-size: 15px; font-weight: bold; margin-top: 20px; margin-bottom: 12px; }
        .critical-analysis ul { margin: 15px 0; padding-left: 20px; }
        .critical-analysis li { margin-bottom: 10px; line-height: 1.5; }
        .critical-analysis strong { color: var(--purple-dark); }

        .error-budget { font-family: 'Courier New', monospace; background-color: rgba(28, 46, 74, 0.03); padding: 10px; border-radius: 3px; margin: 10px 0; font-size: 14px; }

        .references { font-size: 14px; margin-top: 0; padding-top: 0; }
        .references h1, .references h2 { font-size: 18px; }
        .references h3 { font-size: 16px; margin-top: 25px; }
        .reference, .ref-item { margin-bottom: 12px; text-indent: -20px; margin-left: 20px; line-height: 1.5; }

        .appendix { margin-top: 40px; page-break-before: always; border-top: 2px solid var(--purple-mid); padding-top: 20px; }

        @media print {
            @page {
                size: A4;
                margin: 20mm 20mm 20mm 20mm;
            }
            html, body {
                width: 210mm;
                font-size: 11pt;
                zoom: 1;
            }
            body {
                max-width: 100%;
                padding: 0;
                margin: 0;
            }
            .appendix { page-break-before: always; }
            figure { page-break-inside: avoid; }
            table { page-break-inside: avoid; }
            .key-finding, .validation-box, .key-insight { page-break-inside: avoid; }
        }

        table, table.data-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; }
        th, td, table.data-table th, table.data-table td { border: 1px solid var(--purple-mid); padding: 8px 12px; text-align: left; }
        th, table.data-table th { background-color: rgba(28, 46, 74, 0.08); font-weight: bold; color: var(--purple-deep); }
        tr:nth-child(even), table.data-table tr:nth-child(even) { background-color: rgba(28, 46, 74, 0.03); }
        .table-caption { font-size: 0.9em; color: var(--gray-purple); font-style: italic; margin-top: -10px; margin-bottom: 20px; }

        figure { margin: 25px 0; text-align: center; }
        figure img { max-width: 100%; height: auto; border-radius: 4px; }
        figcaption { margin-top: 10px; font-size: 13px; color: var(--gray-purple); font-style: italic; text-align: justify; }

        .MathJax { font-size: 1.1em !important; }
        mjx-container[display="true"] { display: block; text-align: center; }
        mjx-container[display="true"] mjx-math { margin-left: auto; margin-right: auto; }
        .MathJax_Display { text-align: center !important; }
        mjx-container { overflow: hidden !important; max-width: 100%; }
        mjx-container mjx-math { max-width: 100%; }

        code { font-family: 'Courier New', monospace; background-color: rgba(28, 46, 74, 0.06); padding: 2px 6px; border-radius: 3px; font-size: 13px; }
        pre code { display: block; padding: 15px; overflow-x: auto; }

        .loading { text-align: center; padding: 40px; color: var(--gray-purple); font-style: italic; }

        header .title { border-bottom: none; padding-bottom: 0; }
    </style>

    <!-- Journal overrides — applied on top of base styles above -->
    <link rel="stylesheet" href="styles/manuscript-journal.css">
</head>
<body>
    <header class="header" role="banner">
        <!-- No hero image for journal submission -->
        <h1 class="title">The Cepheid Bias: Resolving the Hubble Tension</h1>
        <div class="author">Matthew Lukin Smawfield</div>
        <div class="author" style="font-size:14px; margin-top:4px;">Independent Researcher, Kingston upon Hull, UK</div>
        <div class="author" style="font-size:13px; margin-top:2px;"><a href="mailto:matthewsmawfield@gmail.com">matthewsmawfield@gmail.com</a></div>
        <div class="author" style="font-size:12px; margin-top:8px; color:#6A5A70;">Submitted to MNRAS &mdash; 22 February 2026</div>
    </header>

    <main id="main-content" role="main">
        <div id="loading" class="loading">Loading manuscript&hellip;</div>
        <div id="manuscript-content" style="display: none;"></div>
    </main>

    <script>
        async function loadManuscriptComponents() {
            try {
                const manifest = await fetch('manifest-journal.json').then(r => r.json());
                const loadingDiv = document.getElementById('loading');
                const contentDiv = document.getElementById('manuscript-content');

                for (const section of manifest.sections.sort((a, b) => a.order - b.order)) {
                    try {
                        const html = await fetch(`components/${section.file}`).then(r => r.text());
                        const sectionDiv = document.createElement('div');
                        sectionDiv.id = section.id;
                        sectionDiv.className = 'manuscript-section';
                        sectionDiv.setAttribute('data-section', section.title);
                        sectionDiv.innerHTML = html;
                        contentDiv.appendChild(sectionDiv);
                    } catch (error) {
                        console.error(`Failed to load section ${section.title}:`, error);
                        const errorDiv = document.createElement('div');
                        errorDiv.innerHTML = `<p style="color:red;">Error loading: components/${section.file}</p>`;
                        contentDiv.appendChild(errorDiv);
                    }
                }

                loadingDiv.style.display = 'none';
                contentDiv.style.display = 'block';

                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
                }
            } catch (error) {
                console.error('Failed to load manuscript:', error);
                document.getElementById('loading').textContent = 'Error loading manuscript. Run via a local server.';
            }
        }

        document.addEventListener('DOMContentLoaded', loadManuscriptComponents);

        // Set PDF filename when printing
        const pdfTitle = 'Smawfield_2026_TEP-H0_MNRAS_submission';
        window.addEventListener('beforeprint', () => { document.title = pdfTitle; });
        window.addEventListener('afterprint', () => { document.title = pdfTitle; });
    </script>
</body>
</html>
