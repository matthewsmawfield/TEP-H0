# Standard GitHub Pages deploy: default branch → build site/ → publish site/dist
name: Deploy to GitHub Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (tag, branch, or SHA)'
        required: true
        default: 'master'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.tag_check.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Tag check (skip deploy if untagged)
        id: tag_check
        run: |
          TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          if [ -z "$TAG" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Commit is not tagged. Skipping deployment."
            echo "deploy=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "deploy=true" >> $GITHUB_OUTPUT
          if [ -n "$TAG" ]; then
            echo "Tag: $TAG"
          fi

      - name: Setup Node.js
        if: steps.tag_check.outputs.deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        if: steps.tag_check.outputs.deploy == 'true'
        working-directory: site
        run: npm ci

      - name: Build static site
        if: steps.tag_check.outputs.deploy == 'true'
        working-directory: site
        run: npm run build

      - name: Setup Pages
        if: steps.tag_check.outputs.deploy == 'true'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: steps.tag_check.outputs.deploy == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.deploy == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
